<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    {% seo %}
    
    {% if site.google_analytics %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
    {% endif %}

    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-main: #1a1a1a;
            --text-muted: #555555;
            --accent: #2563eb;
            --link-color: #2563eb;
            --border: #e5e5e5;
            --wheel-height: 55vh;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f1115;
                --text-main: #f3f4f6;
                --text-muted: #9ca3af;
                --accent: #3b82f6;
                --link-color: #93c5fd; 
                --border: #374151;
            }
        }

        /* Modern, Slim Scrollbar */
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 10px; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--text-muted); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; transition: background-color 0.3s ease; }

        /* Mobile Header */
        .mobile-header { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: var(--bg-color); border-bottom: 1px solid var(--border); z-index: 50; align-items: center; justify-content: space-between; padding: 0 1.5rem; }
        .mobile-header h2 { font-size: 1.2rem; margin: 0; }
        
        .burger-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 5px; }
        .burger-btn span { display: block; width: 25px; height: 3px; background-color: var(--text-main); border-radius: 3px; transition: all 0.3s ease; }

        /* Left Column (Sidebar) */
        .sidebar { width: 300px; flex-shrink: 0; padding: 4rem 2rem; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border); z-index: 40; background-color: var(--bg-color); transition: transform 0.3s ease; }
        .branding h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        .branding p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.4; margin-bottom: 3rem; }
        .menu { list-style: none; }
        .menu li { margin-bottom: 1.2rem; }
        .menu a { text-decoration: none; color: var(--text-muted); font-weight: 500; transition: color 0.2s ease; cursor: pointer; font-size: 1.05rem; }
        .menu a:hover, .menu a.active { color: var(--accent); }
        
        .cv-btn { display: inline-block; padding: 0.75rem 1.5rem; background: transparent; border: 1.5px solid var(--accent); color: var(--accent); border-radius: 8px; text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: all 0.2s ease; text-align: center; width: 100%; }
        .cv-btn:hover { background: var(--accent); color: var(--bg-color); border-color: var(--accent); }

        /* Center Column: Wheel Mechanics */
        .wheel-container { flex: 1; max-width: 750px; min-width: 450px; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; position: relative; padding-left: 2rem; }
        
        .snap-section { height: 100vh; scroll-snap-align: center; display: flex; align-items: center; justify-content: flex-start; padding: 2rem; position: relative; }
        
        .content-card { width: 100%; padding: 1rem 0 1rem 2rem; position: relative; max-height: var(--wheel-height); overflow: hidden; transition: max-height 0.7s cubic-bezier(0.16, 1, 0.3, 1); border-left: 2px solid transparent; }
        .content-card:hover { border-left: 2px solid var(--border); }
        .content-card.expanded { max-height: 85vh; overflow-y: auto; border-left: 2px solid var(--accent); }
        
        .card-fade { position: absolute; bottom: 0; left: 0; width: 100%; height: 120px; background: linear-gradient(transparent, var(--bg-color) 80%); display: flex; align-items: flex-end; justify-content: flex-start; padding-bottom: 1.5rem; cursor: pointer; transition: opacity 0.3s ease; padding-left: 2rem; }
        .content-card.expanded .card-fade { opacity: 0; pointer-events: none; }
        
        .expand-arrow { border: solid var(--accent); border-width: 0 2px 2px 0; display: inline-block; padding: 6px; transform: rotate(45deg); transition: transform 0.4s ease; }
        .content-card.expanded .expand-arrow { transform: rotate(-135deg); margin-top: 15px; }

        /* Right Column: Visual Support Panel */
        .visual-panel { width: 350px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 3rem; position: relative; border-left: 1px dashed var(--border); }
        
        /* FIXED IMAGE CSS: No stretching, proper sizing */
        .dynamic-visual { 
            max-width: 100%; 
            width: auto; 
            max-height: 60vh; 
            border-radius: 12px; 
            object-fit: contain; 
            opacity: 0; 
            transform: scale(0.97); 
            transition: opacity 0.6s ease, transform 0.6s ease; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }
        .dynamic-visual.loaded { opacity: 1; transform: scale(1); }

        /* Typography */
        h2 { margin-bottom: 1.5rem; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
        p { line-height: 1.7; margin-bottom: 1.2rem; color: var(--text-muted); font-size: 1.05rem; }
        ul { margin-left: 1.2rem; margin-bottom: 1.2rem; color: var(--text-muted); }
        li { line-height: 1.6; margin-bottom: 0.5rem; }
        strong { color: var(--text-main); }
        
        .wheel-container a { color: var(--link-color); text-decoration: none; border-bottom: 1px solid transparent; padding-bottom: 1px; transition: border-bottom-color 0.2s ease, color 0.2s ease; }
        .wheel-container a:hover { border-bottom-color: var(--link-color); }
        
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 30; opacity: 0; transition: opacity 0.3s ease; }

        /* Breakpoints for smaller laptops / Mobile */
        @media (max-width: 1150px) {
            .visual-panel { display: none; }
            .wheel-container { max-width: 100%; }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .mobile-header { display: flex; }
            .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 280px; transform: translateX(-100%); padding-top: 80px; }
            .sidebar.nav-open { transform: translateX(0); }
            .mobile-overlay.nav-open { display: block; opacity: 1; }
            .wheel-container { padding-top: 60px; padding-left: 0; scroll-snap-type: none; overflow-x: hidden; }
            .snap-section { height: auto; min-height: 80vh; padding: 1.5rem; scroll-snap-align: none; }
            .content-card { max-height: none; padding-left: 1rem; border-left: 2px solid var(--border); }
            .content-card:hover, .content-card.expanded { border-left: 2px solid var(--border); }
            .card-fade { display: none; }
        }
    </style>
</head>
<body>

    <header class="mobile-header">
        <h2>Guillermo Sahonero</h2>
        <button class="burger-btn" onclick="toggleNav()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <div class="mobile-overlay" id="overlay" onclick="toggleNav()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="branding">
            <h1>Guillermo Sahonero</h1>
            <p>PhD Candidate at UC Chile<br>MRI Researcher & Mechatronics Engineer</p>
            <ul class="menu">
                <li><a data-target="home">Home</a></li>
                <li><a data-target="bio">Short Bio</a></li>
                <li><a data-target="publications">Publications</a></li>
                <li><a data-target="blog">Blog</a></li>
                <li><a data-target="teaching">Teaching & Contributions</a></li>
                <li><a data-target="contact">Contact</a></li>
                <li><a data-target="social-contact">Social Media</a></li>
            </ul>
        </div>
        <a href="/Guillermo_Sahonero_CV.pdf" target="_blank" class="cv-btn">Download CV</a>
    </nav>

    <main class="wheel-container" id="wheel">
        {{ content }}
    </main>

    <aside class="visual-panel">
        <img id="right-visual" src="" alt="Section visual support" class="dynamic-visual">
    </aside>

    <script>
        function toggleNav() {
            document.getElementById('sidebar').classList.toggle('nav-open');
            document.getElementById('overlay').classList.toggle('nav-open');
        }

        document.querySelectorAll('.menu a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('data-target');
                const el = document.getElementById(targetId);
                
                document.getElementById('sidebar').classList.remove('nav-open');
                document.getElementById('overlay').classList.remove('nav-open');

                if(el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    history.replaceState(null, null, targetId === 'home' ? '/' : '/' + targetId);
                }
            });
        });

        function toggleExpand(cardId) {
            document.getElementById(cardId).classList.toggle('expanded');
        }

        const sections = document.querySelectorAll('.snap-section');
        const visualEl = document.getElementById('right-visual');
        const observerOptions = { root: document.getElementById('wheel'), threshold: 0.5 };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    const navUrl = id === 'home' ? '/' : '/' + id;
                    history.replaceState(null, null, navUrl);
                    
                    document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
                    const activeLink = document.querySelector(`.menu a[data-target="${id}"]`);
                    if(activeLink) activeLink.classList.add('active');

                    // FIXED: Image Swap Logic
                    const visualSrc = entry.target.getAttribute('data-visual');
                    
                    if (visualSrc) {
                        // If it's a new image, swap it
                        if (visualEl.getAttribute('src') !== visualSrc) {
                            visualEl.classList.remove('loaded');
                            setTimeout(() => {
                                visualEl.src = visualSrc;
                                visualEl.classList.add('loaded');
                            }, 400);
                        } else {
                            // If it's the SAME image, just make sure it's visible
                            visualEl.classList.add('loaded');
                        }
                    } else {
                        // If no image is needed for this section, hide it
                        visualEl.classList.remove('loaded');
                    }
                }
            });
        }, observerOptions);

        sections.forEach(sec => observer.observe(sec));

        window.addEventListener('load', () => {
            const path = window.location.pathname.replace(/\//g, '');
            if(path && document.getElementById(path)) {
                document.getElementById(path).scrollIntoView({ block: 'center' });
            }
        });
    </script>
</body>
</html>
