<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    {% seo %}
    
    {% if site.google_analytics %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
    {% endif %}

    <style>
        /* CSS Variables for Light/Dark Mode */
        :root {
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-muted: #666666;
            --accent: #0056b3;
            --border: #e0e0e0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #f0f0f0;
                --text-muted: #aaaaaa;
                --accent: #4da3ff;
                --border: #333333;
            }
        }

        /* Layout Basics */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Left Column: Fixed Menu */
        .sidebar { width: 300px; padding: 3rem 2rem; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border); }
        .branding h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        .branding p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .menu { list-style: none; }
        .menu li { margin-bottom: 1rem; }
        .menu a { text-decoration: none; color: var(--text-main); font-weight: 500; transition: color 0.3s ease; cursor: pointer; }
        .menu a:hover, .menu a.active { color: var(--accent); }
        .cv-btn { display: inline-block; padding: 0.6rem 1.2rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; text-decoration: none; font-size: 0.9rem; transition: all 0.3s ease; text-align: center; }
        .cv-btn:hover { background: var(--accent); color: var(--card-bg); }

        /* Right Column: The Wheel Container */
        .wheel-container { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        
        /* The Snap Cards */
        .snap-section { height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .content-card { background-color: var(--card-bg); width: 100%; max-width: 800px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 2.5rem; position: relative; max-height: 60vh; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        
        /* Card Expansion Mechanics */
        .content-card.expanded { max-height: 90vh; overflow-y: auto; }
        .card-fade { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(transparent, var(--card-bg)); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 1rem; cursor: pointer; transition: opacity 0.3s ease; }
        .content-card.expanded .card-fade { opacity: 0; pointer-events: none; }
        
        /* Arrow Icon */
        .expand-arrow { border: solid var(--text-muted); border-width: 0 2px 2px 0; display: inline-block; padding: 6px; transform: rotate(45deg); transition: transform 0.3s; }
        .content-card.expanded .expand-arrow { transform: rotate(-135deg); margin-top: 10px; }

        /* Typography inside cards */
        h2 { margin-bottom: 1.5rem; color: var(--text-main); }
        p, li { line-height: 1.6; color: var(--text-muted); margin-bottom: 1rem; }
        
        /* Mobile fallback */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 1.5rem; }
            .wheel-container { overflow: visible; height: auto; scroll-snap-type: none; }
            .snap-section { height: auto; min-height: 100vh; padding: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="branding">
            <h1>Guillermo Sahonero</h1>
            <p>MRI Researcher & Software Engineer</p>
            <ul class="menu">
                <li><a onclick="scrollToSection('home')">Home</a></li>
                <li><a onclick="scrollToSection('bio')">Short Bio</a></li>
                <li><a onclick="scrollToSection('publications')">Publications</a></li>
                <li><a onclick="scrollToSection('blog')">Blog</a></li>
                <li><a onclick="scrollToSection('teaching')">Teaching & Contributions</a></li>
            </ul>
        </div>
        <a href="/Guillermo_Sahonero_CV.pdf" target="_blank" class="cv-btn">Download CV</a>
    </nav>

    <main class="wheel-container" id="wheel">
        {{ content }}
    </main>

    <script>
        // 1. Smooth Scroll to Section
        function scrollToSection(id) {
            const el = document.getElementById(id);
            if(el) {
                el.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 2. Expand Card Logic
        function toggleExpand(cardId) {
            const card = document.getElementById(cardId);
            card.classList.toggle('expanded');
        }

        // 3. The URL Routing Magic (Updates URL to /section without reloading)
        const sections = document.querySelectorAll('.snap-section');
        const observerOptions = { root: document.getElementById('wheel'), threshold: 0.5 };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    const navUrl = id === 'home' ? '/' : '/' + id;
                    // Change URL bar to /section seamlessly
                    history.replaceState(null, null, navUrl);
                    
                    // Highlight active menu item
                    document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
                    const activeLink = document.querySelector(`.menu a[onclick*="${id}"]`);
                    if(activeLink) activeLink.classList.add('active');
                }
            });
        }, observerOptions);

        sections.forEach(sec => observer.observe(sec));
        const redirect = sessionStorage.getItem('redirectPath');
        if (redirect) {
            sessionStorage.removeItem('redirectPath');
            const target = redirect.replace(/\//g, '');
            if (document.getElementById(target)) {
                setTimeout(() => document.getElementById(target).scrollIntoView({ block: 'center' }), 100);
            }
        }
    </script>
</body>
</html>
