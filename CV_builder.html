<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CV JSON to LaTeX Builder</title>
<style>
:root{--bg:#0b1020;--panel:#121a31;--panel2:#182241;--text:#e8ecf7;--muted:#aab4d6;--accent:#7aa2ff;--accent2:#62d2a2;--danger:#ff7a90;--line:#263154;--input:#0f1730}
*{box-sizing:border-box} body{margin:0;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#09101f,#0b1020 30%,#0f1830);color:var(--text)}
header{padding:24px 20px 10px;max-width:1400px;margin:auto} h1{margin:0 0 6px;font-size:24px} p{margin:0;color:var(--muted)}
main{max-width:1400px;margin:auto;padding:12px 20px 24px;display:grid;grid-template-columns:360px 1fr;gap:14px}
.panel{background:rgba(18,26,49,.96);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.25)}
.sidebar,.content{min-height:calc(100vh - 130px)} .sidebar{padding:14px;overflow:auto} .content{padding:14px;overflow:auto}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap} .stack{display:grid;gap:10px}
button,input,select,textarea{border-radius:10px;border:1px solid var(--line);background:var(--input);color:var(--text);padding:9px 10px;font:inherit}
button{cursor:pointer} button.primary{background:linear-gradient(180deg,#3c67ff,#2b4ed1);border-color:#4d73ff} button.good{background:linear-gradient(180deg,#2f9d6f,#227a55);border-color:#3ab37f} button.danger{background:linear-gradient(180deg,#d95b71,#b63d55);border-color:#ff7a90}
button.small{padding:5px 8px;font-size:12px} input[type=file]{width:100%} textarea{width:100%;min-height:90px;resize:vertical}
hr{border:none;border-top:1px solid var(--line);margin:12px 0}
.section{border:1px solid var(--line);border-radius:14px;padding:10px;background:rgba(255,255,255,.02);margin-bottom:10px}
.section h3{margin:0 0 8px;font-size:15px;display:flex;justify-content:space-between;gap:8px;align-items:center} .tag{font-size:12px;color:var(--muted)}
.item{border:1px solid var(--line);border-radius:12px;padding:9px;margin-top:8px;background:rgba(255,255,255,.03)} .itemhead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px} .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
label.chk{display:flex;gap:8px;align-items:flex-start;margin:5px 0} label.chk input{margin-top:3px} .muted{color:var(--muted)} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
pre{white-space:pre-wrap;word-break:break-word;background:#08101f;border:1px solid var(--line);padding:12px;border-radius:12px;max-height:420px;overflow:auto}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px} .tabbtn{background:#101938} .tabbtn.active{background:linear-gradient(180deg,#314b9b,#24366f)}
.hidden{display:none} .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.smallnote{font-size:12px;color:var(--muted)} .kv{display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:center;margin-bottom:8px}
@media (max-width:1100px){main{grid-template-columns:1fr}.sidebar,.content{min-height:auto}}
</style>
</head>
<body>
<header>
  <h1>CV JSON to LaTeX Builder</h1>
  <p>Upload JSON, edit entries, select what to include, rename section titles, and export a complete LaTeX CV.</p>
</header>
<main>
  <aside class="panel sidebar">
    <div class="stack">
      <input id="fileInput" type="file" accept="application/json,.json" />
      <div class="row">
        <button class="primary" id="loadSampleBtn">Load sample</button>
        <button class="good" id="downloadTexBtn">Download .tex</button>
      </div>
      <div class="row">
        <button id="expandAllBtn">Expand all</button>
        <button id="collapseAllBtn">Collapse all</button>
      </div>
      <hr />
      <div class="kv"><div>Template</div><input id="templateName" value="moderncv" /></div>
      <div class="kv"><div>CV title</div><input id="cvTitle" value="Curriculum Vitae" /></div>
      <div class="kv"><div>Main font</div><input id="mainFont" value="" placeholder="optional" /></div>
      <div class="smallnote">Renamed headings are used only in the exported LaTeX. Selection states are stored in the JSON editor and respected during export.</div>
      <hr />
      <div id="sectionList"></div>
    </div>
  </aside>
  <section class="panel content">
    <div class="tabs">
      <button class="tabbtn active" data-tab="editor">Editor</button>
      <button class="tabbtn" data-tab="latex">LaTeX</button>
      <button class="tabbtn" data-tab="schema">Structure</button>
    </div>
    <div id="editorTab"></div>
    <div id="latexTab" class="hidden"><pre id="latexPreview"></pre></div>
    <div id="schemaTab" class="hidden"><pre id="schemaPreview"></pre></div>
  </section>
</main>
<script>
const sample = {"basics":{"firstname":"Guillermo","lastname":"Sahonero Alvarez","full_name":"Guillermo Sahonero Alvarez","title":"Curriculum Vitae","email":"gsahonero at uc.cl","location":"Santiago, Chile","homepage":"gsahonero.github.io","photo":"GSahonero_color","research_interests":"My research focuses on optimizing Low-Field MRI sequence design. I am particularly interested in applying Deep Learning, Physics-Informed Neural Networks, and high-performance MRI simulation methods. Previously, I worked with Machine Learning techniques for gait recognition, brain-computer interfaces, and FPGA hardware accelerator design."},"education":[{"institution":"Pontificia Universidad Católica de Chile","degree":"PhD in Biological and Medical (Biomedical) Engineering","start":"2022","end":"on going","dissertation":"Low-field MRI Sequence Optimization for Reproducing High-Field Image Quality","description":"Research focused on low-field MRI, sequence optimization, physical simulation, signal processing, deep learning, computer vision, and physics-informed neural networks.","selected":true}],"publications":[{"selected":true,"authors":"A B, C D","title":"Example paper","venue":"Journal","year":"2025"}]};
let data = structuredClone(sample);
let ui = {sections:{}, collapsed:{}};
const el = id => document.getElementById(id);
const safe = s => String(s??'').replace(/[&%$#_{}~^\\]/g,m=>({'&':'\\&','%':'\\%','$':'\\$','#':'\\#','_':'\\_','{':'\\{','}':'\\}','~':'\\textasciitilde{}','^':'\\textasciicircum{}','\\':'\\textbackslash{}'}[m]));
const isObj = v => v && typeof v==='object' && !Array.isArray(v);
function initSections(){ Object.keys(data).forEach(k=>{ if(!ui.sections[k]) ui.sections[k]={include:true, title:k.replace(/_/g,' '), selectedAll:true}; if(!(k in ui.collapsed)) ui.collapsed[k]=false; if(Array.isArray(data[k])) data[k].forEach(it=>{ if(isObj(it) && !('selected' in it)) it.selected=true; }); }); }
function renderSectionList(){ const box=el('sectionList'); box.innerHTML=''; Object.keys(data).forEach(k=>{ const sec=document.createElement('div'); sec.className='section'; const count=Array.isArray(data[k])?data[k].length:'object'; sec.innerHTML=`<h3><span><input type=checkbox ${ui.sections[k].include?'checked':''} data-include="${k}"> ${k}</span><span class="tag">${count}</span></h3><div class="grid2"><input data-title="${k}" value="${ui.sections[k].title||k}" placeholder="Section title"><button class="small" data-toggle="${k}">${ui.collapsed[k]?'Expand':'Collapse'}</button></div>`; box.appendChild(sec); }); }
function renderEditor(){ const box=el('editorTab'); box.innerHTML=''; Object.keys(data).forEach(k=>{ const sec=document.createElement('div'); sec.className='section'; if(ui.collapsed[k]) sec.classList.add('hidden'); let html=`<h3><span>${k}</span><span class="tag">${Array.isArray(data[k])?data[k].length:'object'}</span></h3>`;
if(isObj(data[k])){ html += renderObjectEditor(k,data[k],[]); }
else if(Array.isArray(data[k])){ html += renderArrayEditor(k,data[k]); }
sec.innerHTML=html; box.appendChild(sec); }); bindEditor(); }
function renderObjectEditor(prefix,obj,path){ let html=''; Object.entries(obj).forEach(([kk,v])=>{ const key=[prefix,...path,kk].join('.'); if(Array.isArray(v)) html += `<div class="item"><div class="itemhead"><strong>${kk}</strong><button class="small" data-add-array="${key}">Add item</button></div>${renderArrayValue(key,v)}</div>`; else if(isObj(v)) html += `<div class="item"><div class="itemhead"><strong>${kk}</strong></div>${renderObjectEditor(prefix,v,[...path,kk])}</div>`; else html += `<div class="kv"><div class="mono">${kk}</div><input data-path="${key}" value="${escapeHtml(v)}"></div>`; }); return html; }
function renderArrayEditor(k,arr){ return arr.map((it,i)=>renderArrayItem(k,arr,i)).join('') + `<button class="small" data-add-entry="${k}">Add entry</button>`; }
function renderArrayValue(k,arr){ return arr.map((it,i)=>`<div class="item">${renderArrayItem(k,arr,i)}</div>`).join('') + `<button class="small" data-add-entry="${k}">Add item</button>`; }
function renderArrayItem(k,arr,i){ const it=arr[i]; const checked=(isObj(it)&&('selected' in it)?it.selected:true); let head=`<div class="itemhead"><label class="chk"><input type=checkbox data-select="${k}.${i}" ${checked?'checked':''}><strong>#${i+1}</strong></label><span><button class="small" data-dup="${k}.${i}">Duplicate</button> <button class="small danger" data-del="${k}.${i}">Delete</button></span></div>`; let body=''; if(isObj(it)){ Object.entries(it).forEach(([kk,v])=>{ if(kk==='selected') return; if(Array.isArray(v)) body += `<div class="item"><div class="itemhead"><strong>${kk}</strong><button class="small" data-add-array="${k}.${i}.${kk}">Add item</button></div>${v.map((x,j)=>`<div class="kv"><div class="mono">${j}</div><input data-path="${k}.${i}.${kk}.${j}" value="${escapeHtml(x)}"></div>`).join('')}</div>`; else body += `<div class="kv"><div class="mono">${kk}</div><input data-path="${k}.${i}.${kk}" value="${escapeHtml(v)}"></div>`; }); } else { body = `<input data-path="${k}.${i}" value="${escapeHtml(it)}">`; } return head+body; }
function escapeHtml(v){ return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function bindEditor(){ document.querySelectorAll('[data-path]').forEach(inp=>inp.oninput=e=>setPath(e.target.dataset.path,e.target.value)); document.querySelectorAll('[data-select]').forEach(cb=>cb.onchange=e=>{ const [k,i]=e.target.dataset.select.split('.'); data[k][+i].selected=e.target.checked; }); document.querySelectorAll('[data-include]').forEach(cb=>cb.onchange=e=>ui.sections[e.target.dataset.include].include=e.target.checked); document.querySelectorAll('[data-title]').forEach(inp=>inp.oninput=e=>ui.sections[e.target.dataset.title].title=e.target.value); document.querySelectorAll('[data-toggle]').forEach(btn=>btn.onclick=e=>{ const k=e.target.dataset.toggle; ui.collapsed[k]=!ui.collapsed[k]; renderAll(); }); document.querySelectorAll('[data-add-entry]').forEach(btn=>btn.onclick=e=>addEntry(e.target.dataset.addEntry)); document.querySelectorAll('[data-del]').forEach(btn=>btn.onclick=e=>delEntry(e.target.dataset.del)); document.querySelectorAll('[data-dup]').forEach(btn=>btn.onclick=e=>dupEntry(e.target.dataset.dup)); document.querySelectorAll('[data-add-array]').forEach(btn=>btn.onclick=e=>addArrayItem(e.target.dataset.addArray)); }
function setPath(path,val){ const parts=path.split('.'); let ref=data; for(let i=0;i<parts.length-1;i++) ref=ref[parts[i]]; const last=parts[parts.length-1]; ref[last]=val; refresh(); }
function addEntry(k){ if(!Array.isArray(data[k])) data[k]=[]; data[k].push({selected:true}); refresh(); }
function delEntry(path){ const [k,i]=path.split('.'); data[k].splice(+i,1); refresh(); }
function dupEntry(path){ const [k,i]=path.split('.'); data[k].splice(+i+1,0,structuredClone(data[k][+i])); refresh(); }
function addArrayItem(path){ const parts=path.split('.'); let ref=data; for(let i=0;i<parts.length;i++) ref=ref[parts[i]]; if(Array.isArray(ref)) ref.push(''); refresh(); }
function renderLatex(){ const lines=[]; const basics=data.basics||{}; lines.push('\\documentclass[11pt,a4paper,sans]{moderncv}'); lines.push('\\moderncvstyle{classic}'); lines.push('\\moderncvcolor{blue}'); lines.push('\\usepackage[scale=0.93]{geometry}'); lines.push('\\name{'+safe(basics.firstname||'')+'}{'+safe(basics.lastname||'')+'}'); lines.push('\\title{'+safe(el('cvTitle').value)+'}'); if(basics.email) lines.push('\\email{'+safe(basics.email)+'}'); if(basics.homepage) lines.push('\\homepage{'+safe(basics.homepage)+'}'); if(basics.location) lines.push('\\address{'+safe(basics.location)+'}{}{}'); lines.push('\\begin{document}'); lines.push('\\makecvtitle'); if(basics.research_interests) lines.push('\\section{Main Research Interests}\\cvitem{}{'+safe(basics.research_interests)+'}'); Object.keys(data).forEach(k=>{ if(k==='basics') return; if(!ui.sections[k]?.include) return; const title=ui.sections[k]?.title||k.replace(/_/g,' '); const v=data[k]; if(Array.isArray(v)){ const items=v.filter(x=>!isObj(x)||x.selected!==false); if(!items.length) return; lines.push('\\section{'+safe(title)+'}'); items.forEach(it=>{ if(!isObj(it)){ lines.push('\\cvitem{}{'+safe(it)+'}'); return; } const txt=Object.entries(it).filter(([a])=>a!=='selected').map(([a,b])=>safe(String(b))).join(' — '); lines.push('\\cvitem{}{'+txt+'}'); }); } else if(isObj(v)){ lines.push('\\section{'+safe(title)+'}'); Object.entries(v).forEach(([a,b])=>{ if(a!=='selected') lines.push('\\cvitem{'+safe(a)+'}{'+safe(String(b))+'}'); }); } }); lines.push('\\end{document}'); el('latexPreview').textContent=lines.join('\n'); el('schemaPreview').textContent=JSON.stringify(data,null,2); return lines.join('\n'); }
function refresh(){ renderSectionList(); renderEditor(); renderLatex(); }
function renderAll(){ refresh(); }
el('fileInput').onchange=async e=>{ const f=e.target.files[0]; if(!f) return; data=JSON.parse(await f.text()); initSections(); refresh(); };
el('loadSampleBtn').onclick=()=>{ data=structuredClone(sample); initSections(); refresh(); };
el('downloadTexBtn').onclick=()=>{ const tex=renderLatex(); const blob=new Blob([tex],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cv_generated.tex'; a.click(); URL.revokeObjectURL(a.href); };
el('expandAllBtn').onclick=()=>{ Object.keys(data).forEach(k=>ui.collapsed[k]=false); refresh(); };
el('collapseAllBtn').onclick=()=>{ Object.keys(data).forEach(k=>ui.collapsed[k]=true); refresh(); };
document.querySelectorAll('.tabbtn').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.tabbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); ['editor','latex','schema'].forEach(t=>el(t+'Tab').classList.add('hidden')); el(b.dataset.tab+'Tab').classList.remove('hidden'); });
initSections(); renderAll();
</script>
</body>
</html>
