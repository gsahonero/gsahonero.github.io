name: Update Google Scholar Publications

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    paths:
      - 'assets/papers/**.pdf'
  workflow_dispatch:

jobs:
  update-papers:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # <-- Fails the job if it hangs longer than 15 minutes
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly

      - name: Fetch Scholar Data
        run: python scripts/fetch_papers.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update publications from Google Scholar"
          file_pattern: "_data/publications.json"