<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Encode path + query + hash into a redirect parameter
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' +
        '?p=/' + l.pathname.slice(1).split('/').map(encodeURIComponent).join('/') +
        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
      );
    </script>
  </head>
  <body></body>
</html>
