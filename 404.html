<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + encodeURIComponent(l.pathname) +
        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
      );
    </script>
  </head>
  <body></body>
</html>
