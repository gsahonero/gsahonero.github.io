<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // This site uses hash-based sections (/#teaching, /#contact, etc.)
      // When someone visits /teaching directly (e.g. after a refresh),
      // GitHub Pages serves this 404. We redirect to /#section instead.
      (function() {
        var path = window.location.pathname; // e.g. "/teaching"
        var section = path.replace(/^\//, '').replace(/\/$/, ''); // e.g. "teaching"
        if (section) {
          window.location.replace('/#' + section);
        } else {
          window.location.replace('/');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
